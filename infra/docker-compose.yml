services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prospect_assist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  scoring-service:
    build:
      # Context is the repo root (not this service's own directory) so the
      # image can bake in a seeded dataset from the sibling
      # synthetic-data-generator package at build time — see
      # services/scoring-service/Dockerfile.
      context: ../
      dockerfile: services/scoring-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CORS_ALLOW_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/prospect_assist
    depends_on:
      - postgres

# The Next.js app (apps/web) is run natively via `npm run dev` for fast refresh
# and is not containerized here; it talks to the scoring-service at
# http://localhost:8000 (see apps/web/.env.example).

volumes:
  postgres_data:
