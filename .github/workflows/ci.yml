name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  scoring-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/scoring-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/scoring-service/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: pytest

  synthetic-data-generator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/synthetic-data-generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: packages/synthetic-data-generator/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check generators cli.py tests
      - run: pytest
      - run: python cli.py --per-archetype 2 --output-dir /tmp/synthetic-smoke

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [scoring-service, synthetic-data-generator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/e2e/requirements-dev.txt
      - run: pip install -r tests/e2e/requirements-dev.txt
      - run: pytest tests/e2e
